version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: luxury-jewelry-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_luxury_secure_pass_123
      MYSQL_DATABASE: luxury_jewelry
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxury-jewelry-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - API_VERSION=v1
      - DATABASE_URL=mysql://root:root_luxury_secure_pass_123@db:3306/luxury_jewelry
      - CLIENT_URL=http://localhost:3000
      - JWT_ACCESS_SECRET=docker_secret_jwt_access_string_production
      - JWT_REFRESH_SECRET=docker_secret_jwt_refresh_string_production
      - COOKIE_SECRET=docker_parser_signing_secret_string
      - OTP_ENCRYPTION_KEY=32_byte_aes_key_for_encrypting_otps_docker
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    container_name: luxury-jewelry-frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  mysql-data:
